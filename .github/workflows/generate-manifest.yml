name: Validar manifest.json

# O manifest.json agora e gerado LOCALMENTE com build-manifest.ps1 e comitado
# junto com as alteracoes do client (um unico push, sem bot comitando de volta).
# Esta Action NAO escreve nada no repositorio: ela apenas FALHA se o manifest
# comitado estiver desatualizado em relacao aos arquivos, te lembrando de rodar
# o build-manifest.ps1 antes de subir. Isso elimina os conflitos de merge.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Validar manifest.json (sem escrever nada)
        shell: pwsh
        run: ./build-manifest.ps1 -Check
