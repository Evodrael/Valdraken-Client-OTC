name: Gerar manifest.json

# Roda a cada push na main. 'paths-ignore' evita loop infinito:
# quando a própria Action commita só o manifest.json, esse push é ignorado.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'manifest.json'
  workflow_dispatch:   # permite rodar manualmente pela aba Actions

permissions:
  contents: write       # necessário para o bot commitar o manifest.json de volta

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Gerar manifest.json
        run: python3 .github/scripts/generate_manifest.py

      - name: Commit e push (somente se houver mudança)
        run: |
          if git diff --quiet -- manifest.json; then
            echo "Nenhuma mudança no manifest.json — nada a commitar."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "chore: atualizar manifest.json [skip ci]"
            git push
          fi
